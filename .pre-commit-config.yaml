repos:
  - repo: local
    hooks:
      - id: md-body-audit
        name: MD prompt-body audit
        entry: python tools/audit_prompt_bodies.py --check
        language: system
        pass_filenames: false
      - id: md-capability-graph
        name: MD capability graph consistency
        entry: python tools/build_capability_graph.py --check
        language: system
        pass_filenames: false
      - id: md-documentation-links
        name: MD documentation link integrity
        entry: python tools/check_documentation_links.py
        language: system
        pass_filenames: false
      - id: md-evaluations
        name: MD deterministic evaluation harness
        entry: python tools/run_evaluations.py
        language: system
        pass_filenames: false
      - id: md-tests
        name: MD unit and regression tests
        entry: pytest -q
        language: system
        pass_filenames: false
      - id: md-validate
        name: MD complete structural validation
        entry: python tools/validate_suite.py
        language: system
        pass_filenames: false
