name: Validate Mission Directives
on:
  push:
  pull_request:
jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: '3.12'
          activate-environment: 'true'
      - run: uv pip install -r requirements-dev.txt
      - name: Generate audit artifacts
        run: python tools/audit_prompt_bodies.py
      - name: Deterministic tests
        run: python tools/run_tests.py
      - name: Evaluation fixtures
        run: python tools/run_evaluations.py
      - name: Validate templates
        run: python tools/validate_templates.py
      - name: Script parity
        run: python tools/check_script_parity.py
      - name: Release consistency
        run: python tools/check_release_consistency.py
      - name: Generated reproducibility
        run: python tools/check_generated_reproducibility.py
      - name: Full validation
        run: python tools/validate_suite.py
      - name: Bash wrapper smoke test
        if: runner.os != 'Windows'
        run: bash tools/validate-suite.sh
      - name: PowerShell wrapper smoke test
        if: runner.os == 'Windows'
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./tools/validate-suite.ps1
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: validation-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            BODY_QUALITY_AUDIT.json
            BODY_QUALITY_AUDIT.md
            VALIDATION.json
            .prompt_suite/results/TEST_RESULTS.json
            .prompt_suite/results/EVALUATION_STATUS.json
