name: Validate Mission Directives
on:
  push:
  pull_request:
jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - run: uv pip install -r requirements-dev.txt
      - name: Generate audit artifacts
        run: python tools/audit_prompt_bodies.py
      - name: Deterministic tests
        run: python tools/run_tests.py
      - name: Validate templates
        run: python tools/validate_templates.py
      - name: Release consistency
        run: python tools/check_release_consistency.py
      - name: Generated reproducibility
        run: python tools/check_generated_reproducibility.py
      - name: Full validation
        run: python tools/validate_suite.py
      - name: Bash wrapper smoke test
        if: runner.os != 'Windows'
        run: bash tools/validate-suite.sh
      - name: PowerShell wrapper smoke test
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/validate-suite.ps1
